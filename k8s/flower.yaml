apiVersion: v1
kind: Service
metadata:
  name: flower
  namespace: prod-youcube
  labels:
    app: flower
spec:
  type: LoadBalancer
  ports:
  - port: 5555
    targetPort: 5555
    protocol: TCP
  selector:
    app: flower
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  namespace: prod-youcube
  labels:
    app: flower
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower
  template:
    metadata:
      labels:
        app: flower
    spec:
      containers:
      - name: flower
        image: youcube:dev
        imagePullPolicy: Never
        command: ["/bin/sh", "-c", "cd backend && celery -A tasks flower --port=5555"]
        ports:
        - containerPort: 5555
        env:
        - name: ENV
          value: "prod"
        envFrom:
        - configMapRef:
            name: youcube-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 5555
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5555
          initialDelaySeconds: 10
          periodSeconds: 5