apiVersion: v1
kind: Service
metadata:
  name: fastapi
  namespace: prod-youcube
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: fastapi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: prod-youcube
  labels:
    app: fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      initContainers:
      - name: init-db
        image: youcube:dev
        imagePullPolicy: Never
        command: ["/bin/sh", "-c", "cd backend && python database.py"]
        envFrom:
        - configMapRef:
            name: youcube-config
      containers:
      - name: fastapi
        image: youcube:dev
        imagePullPolicy: Never
        command: ["/bin/sh", "-c", "cd backend && uvicorn app:app --host 0.0.0.0 --port 8000"]
        ports:
        - containerPort: 8000
        env:
        - name: ENV
          value: "prod"
        envFrom:
        - configMapRef:
            name: youcube-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
